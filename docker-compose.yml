# Pin the Compose project name so every git worktree reuses the SAME shared
# containers (postgres / redis / minio) instead of each worktree spinning up
# its own under a dir-derived project name. Worktrees stay isolated via their
# namespaced DBs (${project}_wt_<slot>), redis index, and bucket prefixes —
# not separate container instances.
name: ${PROJECT_NAME:-template}

services:
  postgres:
    image: postgres:18-alpine
    container_name: ${PROJECT_NAME:-template}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${PROJECT_NAME:-template}
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/db/pg-init.sh:/docker-entrypoint-initdb.d/pg-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-template}_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${PROJECT_NAME:-template}_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      PROJECT: ${PROJECT_NAME:-template}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - ./scripts/db/minio-init.sh:/usr/local/bin/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
