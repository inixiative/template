services:
  postgres:
    image: postgres:18-alpine
    container_name: ${PROJECT_NAME:-template}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${PROJECT_NAME:-template}
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/db/pg-init.sh:/docker-entrypoint-initdb.d/pg-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-template}_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${PROJECT_NAME:-template}_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mc-init:
    image: minio/mc:latest
    container_name: ${PROJECT_NAME:-template}_mc_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      PROJECT: ${PROJECT_NAME:-template}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/$$PROJECT-system &&
        mc mb --ignore-existing local/$$PROJECT-user &&
        mc mb --ignore-existing local/$$PROJECT-system-test &&
        mc mb --ignore-existing local/$$PROJECT-user-test &&
        echo 'Buckets ready: '$$PROJECT-{system,user,system-test,user-test}
      "
    restart: "no"
