services:
  postgres:
    image: postgres:18-alpine
    container_name: ${PROJECT_NAME:-template}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${PROJECT_NAME:-template}
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/db/pg-init.sh:/docker-entrypoint-initdb.d/pg-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-template}_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  muninndb:
    image: ghcr.io/scrypster/muninndb:latest
    container_name: ${PROJECT_NAME:-template}_muninndb
    restart: unless-stopped
    environment:
      MUNINNDB_DATA: /data
      MUNINN_LOCAL_EMBED: "1"
    ports:
      - "8475:8475"   # REST API
      - "8476:8476"   # Admin UI
      - "8750:8750"   # MCP server
    volumes:
      - ./volumes/muninndb:/data   # bind mount — survives docker compose down -v
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8475/health"]
      interval: 10s
      timeout: 5s
      retries: 5
